name: Smoke Release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release CLI
    types:
      - completed
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  first-run:
    name: First run from latest release
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Smoke latest release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\scripts\smoke-first-run.ps1
