name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail
          suffix=""
          if [ "${GOOS}" = "windows" ]; then
            suffix=".exe"
          fi

          name="datapan-cli_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          outdir="dist/${name}"
          mkdir -p "${outdir}"

          go build -trimpath -ldflags="-s -w" -o "${outdir}/datapan${suffix}" ./cmd/datapan
          go build -trimpath -ldflags="-s -w" -o "${outdir}/dp${suffix}" ./cmd/dp
          cp README.md LICENSE "${outdir}/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${name}.zip" "${name}")
          else
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: datapan-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download archive artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print0 | sort -z | xargs -0 sha256sum > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "datapan-cli ${GITHUB_REF_NAME}" \
            --notes "Datapan CLI binary release for ${GITHUB_REF_NAME}. Install a platform archive, then put datapan or dp on PATH. Checksums are attached."
