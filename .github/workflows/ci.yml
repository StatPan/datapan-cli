name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Check Unix install script syntax
        if: runner.os != 'Windows'
        run: sh -n scripts/install.sh

      - name: Check Windows install script help
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\install.ps1 -Help

      - name: Build datapan
        run: go build ./cmd/datapan

      - name: Build dp alias
        run: go build ./cmd/dp
